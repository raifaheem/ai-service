# Alertmanager config — dispatches all alerts via webhook to alertmanager-bot,
# which translates them into Telegram messages using TELEGRAM_BOT_TOKEN /
# TELEGRAM_CHAT_ID injected through the alertmanager-bot service env.
#
# We use the webhook bridge (rather than alertmanager's native telegram_configs)
# specifically because alertmanager doesn't natively expand ${VAR} substitutions
# in its config file — keeping secrets out of this file means no template-render
# step on the prod host.

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  # Re-fire critical alerts every 4h if still active so they aren't silently
  # forgotten; warnings re-fire every 12h.
  repeat_interval: 4h
  receiver: telegram-default
  routes:
    - match:
        severity: critical
      receiver: telegram-critical
      repeat_interval: 4h
    - match:
        severity: warning
      receiver: telegram-default
      repeat_interval: 12h

receivers:
  - name: telegram-default
    webhook_configs:
      - url: http://alertmanager-bot:8080
        send_resolved: true

  - name: telegram-critical
    webhook_configs:
      - url: http://alertmanager-bot:8080
        send_resolved: true

inhibit_rules:
  # If the whole target is down, suppress the noisier downstream alerts
  # (5xx rate, latency) — they'd just be measuring the silence.
  - source_match:
      alertname: HealthAITargetDown
    target_match_re:
      alertname: "High5xxRate|HighLatencyP95"
    equal: ["service"]
