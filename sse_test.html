<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>SSE test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 90px; }
    pre { white-space: pre-wrap; border: 1px solid #ddd; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>SSE streaming test</h2>
  <label>Service token:</label>
  <label for="token"></label><input id="token" style="width:100%" placeholder="SERVICE_TOKEN" />
  <br><br>
  <label>Message:</label>
  <label for="msg"></label><textarea id="msg">У меня часто болит голова к вечеру. Что можно сделать?</textarea>
  <br>
  <button id="go">Send</button>

  <h3>Output</h3>
  <pre id="out"></pre>

  <script>
    const out = document.getElementById("out");
    const btn = document.getElementById("go");

    function parseSSEChunk(chunk) {
      const lines = chunk.split("\n");
      const eventLine = lines.find(l => l.startsWith("event:")) || "event: message";
      const dataLine  = lines.find(l => l.startsWith("data:"))  || "data: {}";
      const event = eventLine.slice(6).trim();
      const data = JSON.parse(dataLine.slice(5).trim() || "{}");
      return { event, data };
    }

    btn.onclick = async () => {
      out.textContent = "";
      const token = document.getElementById("token").value.trim();
      const msg = document.getElementById("msg").value;

      const res = await fetch("http://localhost:8001/v1/chat/stream", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "text/event-stream",
          "X-Service-Token": token,
        },
        body: JSON.stringify({ message: msg, locale: "ru" })
      });

      if (!res.ok) {
        out.textContent = `HTTP ${res.status}`;
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const chunks = buffer.split("\n\n");
        buffer = chunks.pop() || "";

        for (const chunk of chunks) {
          const { event, data } = parseSSEChunk(chunk);
          if (event === "meta") {
            out.textContent += `\n[conversation_id] ${data.conversation_id}\n\n`;
          } else if (event === "delta") {
            out.textContent += data.text || "";
          } else if (event === "final") {
            out.textContent += `\n\n[final] ${data.conversation_id}\n`;
            out.textContent += `\n\n[usage] ${JSON.stringify(data.usage || {})}\n`;
          } else if (event === "error") {
            out.textContent += `\n\n[error] ${data.message}\n`;
          }
        }
      }
    };
  </script>
</body>
</html>
