services:
  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - redis-health-ai-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-health-ai-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    restart: unless-stopped
    # Qdrant image ships without curl/wget; TCP probe here, deeper /readyz
    # check is performed by the ai service's /health endpoint.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q 200' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  ai:
    build: .
    env_file:
      - .env.docker
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    # Dev-only bind mount: edits in ./app/ (e.g. dev_ui/index.html) are visible
    # inside the container after a browser refresh — no `up --build` needed.
    # Read-only so the container can never write back to host. The prod overlay
    # (docker-compose.prod.yml) does NOT replicate this mount.
    volumes:
      - ./app:/app/app:ro
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8001/health" ]
      interval: 10s
      timeout: 3s
      retries: 20

  # OpenTelemetry Collector + Jaeger UI for local trace exploration.
  # Activated via the "tracing" profile so dev defaults stay light:
  #   docker compose --profile tracing up -d
  # Then set OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317 in .env.docker
  # (or http://localhost:4317 for host-side processes) and view the trace tree
  # at http://localhost:16686.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    profiles: ["tracing"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"  # OTLP gRPC
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: ["tracing"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # UI
    restart: unless-stopped

  # One-shot seeder for the RAG knowledge base.
  # Runs independently of the `ai` service and does NOT require ENABLE_DEV_ROUTES,
  # so it's safe in prod overlays. Invoke with:
  #   docker compose --profile seed run --rm seed
  seed:
    build: .
    profiles: ["seed"]
    env_file:
      - .env.docker
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Host knowledge base read-only so the seed can read the manifest + articles.
    volumes:
      - ./data/knowledge_base:/app/data/knowledge_base:ro
    command: python scripts/seed_direct.py --manifest data/knowledge_base/manifest.json

  # One-shot Qdrant snapshot + retention. Snapshots are written into the
  # `qdrant-health-ai-data` volume by Qdrant itself; the `--download-to`
  # mount below gives the host a copy for off-host transport (rclone/S3/etc).
  # Wire to host cron daily:
  #   docker compose --profile backup run --rm qdrant-backup
  qdrant-backup:
    build: .
    profiles: ["backup"]
    env_file:
      - .env.docker
    environment:
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./backups/qdrant:/backup/qdrant
    command: python scripts/qdrant_backup.py --download-to /backup/qdrant --keep-last 7

volumes:
  redis-health-ai-data:
  qdrant-health-ai-data: