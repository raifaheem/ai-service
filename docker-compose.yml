services:
  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - redis-health-ai-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-health-ai-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    restart: unless-stopped
    # Qdrant image ships without curl/wget; TCP probe here, deeper /readyz
    # check is performed by the ai service's /health endpoint.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && head -n 1 <&3 | grep -q 200' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  ai:
    build: .
    env_file:
      - .env.docker
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8001/health" ]
      interval: 10s
      timeout: 3s
      retries: 20

  # One-shot seeder for the RAG knowledge base.
  # Runs independently of the `ai` service and does NOT require ENABLE_DEV_ROUTES,
  # so it's safe in prod overlays. Invoke with:
  #   docker compose --profile seed run --rm seed
  seed:
    build: .
    profiles: ["seed"]
    env_file:
      - .env.docker
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Host knowledge base read-only so the seed can read the manifest + articles.
    volumes:
      - ./data/knowledge_base:/app/data/knowledge_base:ro
    command: python scripts/seed_direct.py --manifest data/knowledge_base/manifest.json

volumes:
  redis-health-ai-data:
  qdrant-health-ai-data: